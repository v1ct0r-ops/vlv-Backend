version: '3.9'

services:
  # BASE DE DATOS 
  db:
    image: postgres:15-alpine
    container_name: vlv_postgres_db
    restart: always
    
    environment:
      POSTGRES_USER: gas_user
      POSTGRES_PASSWORD: gas_password_secreta
      POSTGRES_DB: gas_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    
    ports:
      - "5434:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Opcional: Script de inicialización
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    
    networks:
      - vlv_network
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gas_user -d gas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  #  VISUALIZADOR (ADMIN) 
  adminer:
    image: adminer:latest
    container_name: vlv_adminer
    restart: always
    
    ports:
      - "8080:8080"
    
    environment:
      ADMINER_DEFAULT_SERVER: db
    
    depends_on:
      db:
        condition: service_healthy
    
    networks:
      - vlv_network

  #  API FASTAPI 
  api:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: vlv_api_fastapi
    restart: always
    
    ports:
      - "5000:5000"
    
    environment:
      DATABASE_URL: postgresql://gas_user:gas_password_secreta@db:5432/gas_db
      API_TITLE: "Inventario de Gas"
      DEBUG: "False"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
    
    depends_on:
      db:
        condition: service_healthy

    command: uvicorn main:app --host 0.0.0.0 --port 5000 --reload

    volumes:
      - .:/app  # Hot reload en desarrollo

    networks:
      - vlv_network

#  VOLÚMENES 
volumes:
  postgres_data:
    driver: local

#  REDES 
networks:
  vlv_network:
    driver: bridge